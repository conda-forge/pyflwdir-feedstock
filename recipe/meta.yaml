{% set name = "pyflwdir" %}
{% set version = "0.5.11" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyflwdir-{{ version }}.tar.gz
  sha256: 1631dc53556137cd20f2c4a278f9e899eadb18ac1ad3dd400b3f5cbcd0e20dc6

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - flit
    - python {{ python_min }}
  run:
    - affine
    - numba >=0.54,<1.0
    - numpy
    - python >={{ python_min }}
    - scipy

test:
  imports:
    - pyflwdir
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/deltares/pyflwdir/
  summary: Fast methods to work with hydro- and topography data in pure Python.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - FMSST
    - DirkEilander
